apiVersion: v1
kind: Service
metadata:
  name: {{ include "klgn-bioit-wiki.fullname" . }}-service
  labels:
    {{- include "klgn-bioit-wiki.labels" . | nindent 4 }}
  annotations:
    # IBM Cloud VPC LoadBalancer annotations
    service.kubernetes.io/ibm-load-balancer-cloud-provider-ip-type: "public"
    # Optional: for private load balancer, use:
    # service.kubernetes.io/ibm-load-balancer-cloud-provider-ip-type: "private"
    service.kubernetes.io/ibm-load-balancer-cloud-provider-zone: "{{ .Values.service.zone }}"
spec:
  type: LoadBalancer
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    {{- include "klgn-bioit-wiki.selectorLabels" . | nindent 4 }}
